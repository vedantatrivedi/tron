spec_version: 1
name: tron
description: Live k3d benchmark for diagnosing and repairing realistic Kubernetes incidents under partial observability.
type: benchmark
runtime: fastapi
app: server.app:app
port: 7860
entrypoints:
  server: python -m tron_openenv.server.app
  inference: python inference.py
  demo_eval: python eval/demo.py
benchmark_runtime:
  reset_command: POST /reset
  step_command: POST /step
  state_command: GET /state
  reset_strategy: in_cluster_restore
  live_cluster: k3d
  server_port: 7860
  ingress_url: http://127.0.0.1:7860
  dockerfile: Dockerfile
agents:
  - name: openai-baseline
    description: OpenAI-client baseline that emits one kubectl or curl command per turn.
tasks:
  - id: easy
    name: Easy Redis Service Wiring
    scenario_id: service-selector-mismatch
    difficulty: easy
    score_range: [0.001, 0.999]
    description: Repair service-to-pod wiring so the frontend can reach redis.
    grader: grade_easy
  - id: medium
    name: Medium Config Drift Rollout
    scenario_id: bad-rollout-wrong-redis-host
    difficulty: medium
    score_range: [0.001, 0.999]
    description: Repair configuration drift and ensure the durable rollout picks it up.
    grader: grade_medium
  - id: hard
    name: Hard Policy Plus Drift
    scenario_id: networkpolicy-plus-secondary-drift
    difficulty: hard
    score_range: [0.001, 0.999]
    description: Repair a compound outage spanning policy and routing drift.
    grader: grade_hard
observability:
  partial_observability: true
  blackbox_service_probe: true
  recent_change_hints: true
  automatic_logs: false
  automatic_describe: false
scenario_sampling:
  randomized_parameters: true
  seeded_reproducibility: true
  catalog: tron/scenario_catalog.py
evaluation:
  oracle: tron/oracle.py
  reward_model: service_score_delta_plus_action_cost
  max_agent_steps: 18
