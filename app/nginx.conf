events {}
http {
  upstream redis_bridge {
    server 127.0.0.1:9000;
  }

  server {
    listen 8080;

    location = /health {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
    }

    location = /data {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://redis_bridge/data;
    }

    location = /read {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://redis_bridge/read;
    }

    location = /write {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_pass http://redis_bridge/write$is_args$args;
    }

    location = / {
      default_type text/plain;
      return 200 "tron benchmark app\n";
    }
  }
}
