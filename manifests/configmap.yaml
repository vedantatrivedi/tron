apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: tron
data:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_KEY: tron:data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tron
data:
  nginx.conf: |
    events {}
    http {
      upstream redis_bridge {
        server 127.0.0.1:9000;
      }

      server {
        listen 8080;

        location = /health {
          access_log off;
          default_type text/plain;
          return 200 "ok\n";
        }

        location = /data {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Connection "";
          proxy_pass http://redis_bridge/data;
        }

        location = /read {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Connection "";
          proxy_pass http://redis_bridge/read;
        }

        location = /write {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Connection "";
          proxy_pass http://redis_bridge/write$is_args$args;
        }

        location = / {
          default_type text/plain;
          return 200 "tron benchmark app\n";
        }
      }
    }
  bridge.py: |
    import json
    import os
    import socket
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, urlparse

    REDIS_HOST = os.environ.get("REDIS_HOST", "redis")
    REDIS_PORT = int(os.environ.get("REDIS_PORT", "6379"))
    REDIS_KEY = os.environ.get("REDIS_KEY", "tron:data")


    def encode(parts):
        payload = [f"*{len(parts)}\r\n".encode()]
        for part in parts:
            data = str(part).encode()
            payload.append(f"${len(data)}\r\n".encode())
            payload.append(data + b"\r\n")
        return b"".join(payload)


    def read_line(sock):
        data = bytearray()
        while not data.endswith(b"\r\n"):
            chunk = sock.recv(1)
            if not chunk:
                raise ConnectionError("unexpected EOF from redis")
            data.extend(chunk)
        return bytes(data[:-2])


    def read_resp(sock):
        prefix = sock.recv(1)
        if not prefix:
            raise ConnectionError("empty response from redis")
        if prefix in (b"+", b"-", b":"):
            return prefix.decode() + read_line(sock).decode()
        if prefix == b"$":
            length = int(read_line(sock))
            if length == -1:
                return None
            payload = bytearray()
            while len(payload) < length:
                chunk = sock.recv(length - len(payload))
                if not chunk:
                    raise ConnectionError("truncated bulk response from redis")
                payload.extend(chunk)
            if sock.recv(2) != b"\r\n":
                raise ConnectionError("invalid bulk terminator from redis")
            return payload.decode()
        raise ConnectionError(f"unsupported redis response prefix: {prefix!r}")


    def redis_command(*parts):
        with socket.create_connection((REDIS_HOST, REDIS_PORT), timeout=2.0) as sock:
            sock.sendall(encode(parts))
            return read_resp(sock)


    class Handler(BaseHTTPRequestHandler):
        server_version = "tron-redis-bridge/0.1"

        def log_message(self, format, *args):
            return

        def write_json(self, status, payload):
            body = json.dumps(payload, sort_keys=True).encode() + b"\n"
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            parsed = urlparse(self.path)
            try:
                if parsed.path == "/data":
                    value = redis_command("GET", REDIS_KEY)
                    counter = redis_command("INCR", f"{REDIS_KEY}:requests")
                    self.write_json(
                        200,
                        {
                            "key": REDIS_KEY,
                            "value": value or "",
                            "requests": int(str(counter).lstrip(":")),
                        },
                    )
                    return

                if parsed.path == "/read":
                    value = redis_command("GET", REDIS_KEY)
                    self.write_json(200, {"key": REDIS_KEY, "value": value or ""})
                    return

                if parsed.path == "/write":
                    params = parse_qs(parsed.query)
                    value = params.get("value", ["benchmark"])[0]
                    redis_command("SET", REDIS_KEY, value)
                    self.write_json(200, {"key": REDIS_KEY, "value": value, "status": "stored"})
                    return

                self.write_json(404, {"error": "not found"})
            except Exception as exc:
                self.write_json(503, {"error": "redis unavailable", "detail": str(exc)})


    if __name__ == "__main__":
        ThreadingHTTPServer(("0.0.0.0", 9000), Handler).serve_forever()
